# version: "3.9"

services:

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: antigravity-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - antigravity-net
    # No ports exposed — traffic goes through nginx reverse proxy only

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: antigravity-backend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - antigravity-net
    # No ports exposed — traffic goes through nginx reverse proxy only

  mongo:
    image: mongo:7
    container_name: antigravity-mongo
    restart: unless-stopped
    command: ["mongod", "--quiet"]
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS}
      MONGO_INITDB_DATABASE: antigravity
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - antigravity-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    # No ports exposed — only backend container talks to mongo internally

  nginx:
    image: nginx:alpine
    container_name: antigravity-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - antigravity-net

networks:
  antigravity-net:
    driver: bridge

volumes:
  mongo_data:
    driver: local